<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Adrian’s Lab Notes</title>
    <meta name="description" content="Minimal notes on engineering, AI, and experiments." />

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-93WD6911S1"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('consent', 'default', {
        ad_storage: 'denied',
        ad_user_data: 'denied',
        ad_personalization: 'denied',
        analytics_storage: 'denied'
      });
      gtag('js', new Date());
      gtag('config', 'G-93WD6911S1');
    </script>

    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        background: #000;
        color: #efefef;
        font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      main {
        flex: 1;
        max-width: 640px;
        width: 100%;
        margin: 0 auto;
        padding: 64px 20px 28px;
      }
      h1 { margin: 0 0 4px; font-size: 2rem; font-weight: 500; }
      .sub { margin: 0 0 28px; color: #9b9b9b; }
      a { color: #efefef; text-decoration: none; }
      a:hover { text-decoration: underline; }
      ul { list-style: none; padding: 0; margin: 0; }
      li { margin: 0 0 10px; }
      .date { color: #777; margin-left: 8px; font-size: .92rem; }
      footer {
        max-width: 640px;
        width: 100%;
        margin: 0 auto;
        padding: 0 20px 28px;
        color: #6e6e6e;
        font-size: .88rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Adrian’s Lab Notes</h1>
      <p class="sub">Engineering, AI, experiments.</p>

      <ul>
        <li>
          <a href="/posts/build-log-1-release-gates.html">Build Log #1: Release Gates for AI Features</a>
          <span class="date">Mar 2026</span>
        </li>
        <li>
          <a href="/posts/ai-quality-loops.html">AI Quality Loops That Actually Prevent Regressions</a>
          <span class="date">Mar 2026</span>
        </li>
        <li>
          <a href="/posts/hello-world.html">How I use OpenClaw</a>
          <span class="date">Mar 2026</span>
        </li>
      </ul>
    </main>

    <footer>© <span id="year"></span> Adrian Ross</footer>

    <div id="consent-banner" style="position:fixed;left:16px;right:16px;bottom:16px;background:#101010;border:1px solid #242424;border-radius:10px;padding:12px;display:none;z-index:9999;">
      <p style="margin:0 0 8px;color:#c9c9c9;">Allow analytics cookies?</p>
      <button id="consent-accept" style="margin-right:8px;padding:6px 10px;border-radius:6px;border:0;background:#ddd;color:#000;cursor:pointer;">Accept</button>
      <button id="consent-reject" style="padding:6px 10px;border-radius:6px;border:1px solid #444;background:transparent;color:#ddd;cursor:pointer;">Reject</button>
    </div>

    <script>
      document.getElementById('year').textContent = new Date().getFullYear();

      const key = 'adrian_blog_consent_v1';
      const banner = document.getElementById('consent-banner');
      const consent = localStorage.getItem(key);

      function applyConsent(granted) {
        gtag('consent', 'update', {
          analytics_storage: granted ? 'granted' : 'denied',
          ad_storage: 'denied',
          ad_user_data: 'denied',
          ad_personalization: 'denied'
        });
      }

      if (!consent) banner.style.display = 'block';
      else applyConsent(consent === 'granted');

      document.getElementById('consent-accept').addEventListener('click', () => {
        localStorage.setItem(key, 'granted');
        applyConsent(true);
        banner.style.display = 'none';
      });

      document.getElementById('consent-reject').addEventListener('click', () => {
        localStorage.setItem(key, 'denied');
        applyConsent(false);
        banner.style.display = 'none';
      });
    </script>
  </body>
</html>
